<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus - Solutions Intelligentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark-blue: #0a1931;
            --bright-yellow: #ffcc00;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-blue);
            color: var(--white);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header { text-align: center; padding: 40px 20px; }
        .logo-text { font-size: 80px; font-weight: 900; color: var(--bright-yellow); margin: 0; text-transform: uppercase; }
        .slogan { font-style: italic; opacity: 0.9; margin-top: -10px; }

        .container { max-width: 900px; width: 90%; margin-bottom: 50px; }
        .section-title { color: var(--bright-yellow); text-transform: uppercase; border-left: 5px solid var(--bright-yellow); padding-left: 15px; margin-bottom: 25px; }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .service-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            display: flex; align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .service-card:hover { background: rgba(255, 204, 0, 0.2); transform: translateY(-5px); border-color: var(--bright-yellow); }
        .service-card i { font-size: 24px; color: var(--bright-yellow); margin-right: 15px; min-width: 30px; text-align: center; }

        /* --- STIL POU MODAL LA --- */
        .modal {
            display: none; 
            position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background-color: #0d1f3d;
            margin: 10% auto; padding: 30px;
            border: 2px solid var(--bright-yellow);
            width: 85%; max-width: 550px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);
        }

        @keyframes slideIn { from {transform: translateY(-30px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        .close-btn {
            position: absolute; right: 20px; top: 15px;
            font-size: 35px; color: var(--bright-yellow); cursor: pointer;
        }

        .modal-content h2 { color: var(--bright-yellow); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .modal-content ul { padding-left: 20px; line-height: 1.8; list-style-type: "✔ "; }
        .modal-content ul li { margin-bottom: 8px; }
        .objektif { 
            background: rgba(255, 204, 0, 0.1); 
            padding: 10px; border-radius: 8px; 
            margin-top: 20px; font-weight: bold; border-left: 4px solid var(--bright-yellow);
        }

        footer { background: #000; width: 100%; text-align: center; padding: 25px 0; margin-top: 50px; border-top: 1px solid var(--glass); }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">Zeus</h1>
        <p class="slogan">Solutions intelligentes & énergie fiable</p>
    </header>

    <div class="container">
        <h2 class="section-title">Nos Services</h2>
        <div class="services-grid">
            <div class="service-card" onclick="showDetails('solaire')">
                <i class="fas fa-solar-panel"></i> <span>INSTALLATION SOLAIRE</span>
            </div>
            <div class="service-card" onclick="showDetails('camera')">
                <i class="fas fa-video"></i> <span>CAMÉRA SURVEILLANCE</span>
            </div>
            <div class="service-card" onclick="showDetails('reseau')">
                <i class="fas fa-network-wired"></i> <span>RÉSEAU & NVR</span>
            </div>
            <div class="service-card" onclick="showDetails('electricite')">
                <i class="fas fa-bolt"></i> <span>MAINTENANCE ÉLECTRIQUE</span>
            </div>
            <div class="service-card" onclick="showDetails('support')">
                <i class="fas fa-headset"></i> <span>SUPPORT TECHNIQUE</span>
            </div>
            <div class="service-card" onclick="showDetails('starlink')">
                <i class="fas fa-satellite-dish"></i> <span>STARLINK INSTALLATION & GESTION</span>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <i class="fas fa-envelope"></i> EMAIL: ALPHAYOURRI2045@GMAIL.COM<br><br>
        &copy; 2026 ZEUS - Tout dwa rezève.
    </footer>

    <script>
        function showDetails(service) {
            const modal = document.getElementById('detailsModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            let content = "";
            let headerTitle = "";

            switch(service) {
                case 'electricite':
                    headerTitle = "⚡ Maintenance Électrique";
                    content = `
                        <ul>
                            <li>Depanaj pann kouran (kay / biznis)</li>
                            <li>Chanjman disjoncteur, prise, switch</li>
                            <li>Reparasyon sikwi elektrik</li>
                            <li>Verifikasyon sekirite enstalasyon yo</li>
                            <li>Entretien tablo elektrik (breaker panel)</li>
                            <li>Dyagnostik surchof oswa kout sikwi</li>
                        </ul>
                        <div class="objektif">👉 Objektif: kenbe sistèm elektrik la an sekirite e stab</div>
                    `;
                    break;
                case 'support':
                    headerTitle = "🛠️ Support Technique";
                    content = `
                        <ul>
                            <li>Depanaj kamera (CCTV / NVR)</li>
                            <li>Rekoneksyon sistèm entènèt / routeur</li>
                            <li>Configurations aparèy (TV box, DVR, etc.)</li>
                            <li>Asistans remote (pa telefòn oswa WhatsApp)</li>
                            <li>Reparasyon sistèm ki pa fonksyone</li>
                            <li>Suivi ak konsèy teknik</li>
                        </ul>
                        <div class="objektif">👉 Objektif: ede kliyan rezoud pwoblèm teknik rapid</div>
                    `;
                    break;
                case 'starlink':
                    headerTitle = "📡 Starlink Installation";
                    content = `
                        <ul>
                            <li>Enstalasyon parabòl Starlink</li>
                            <li>Konfigirasyon entènèt WiFi</li>
                            <li>Optimisation signal (meilleure vitès)</li>
                            <li>Fixation ak oryantasyon antèn</li>
                            <li>Gestion rezo lakay oswa biwo</li>
                            <li>Depanaj koneksyon Starlink</li>
                        </ul>
                        <div class="objektif">🚀 Objektif: garanti yon koneksyon entènèt rapid e stab</div>
                    `;
                    break;
                case 'solaire':
                    headerTitle = "☀️ Installation Solaire";
                    content = `<ul><li>Enstalasyon Panèl Solè</li><li>Konfigirasyon Inverter & Batri</li><li>Maintenance sistèm enèji</li></ul>`;
                    break;
                case 'camera':
                    headerTitle = "📹 Caméra Surveillance";
                    content = `<ul><li>Enstalasyon kamera IP/Analogik</li><li>Konfigirasyon remote (Telefòn)</li><li>Sekirite 24/7</li></ul>`;
                    break;
                case 'reseau':
                    headerTitle = "🌐 Réseau & NVR";
                    content = `<ul><li>Kablaj rezo pwofesyonèl</li><li>Enstalasyon switch ak router</li><li>Konfigirasyon NVR pou sekirite</li></ul>`;
                    break;
            }

            title.innerHTML = headerTitle;
            body.innerHTML = content;
            modal.style.display = "block";
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailsModal');
            if (event.target == modal) { modal.style.display = "none"; }
        }
    </script>
</body>
</html>
